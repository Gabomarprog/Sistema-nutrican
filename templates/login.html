<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUTRICAN | Acceso al Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0B84F5;
            --primary-dark: #0652A3;
            --primary-light: #E6F2FE;
            --accent: #FF8C00;
            --bg: #F8FAFC;
            --white: #FFFFFF;
            --text: #1E293B;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.03), 0 10px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.08), 0 8px 20px rgba(0,0,0,0.04);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #F0F7FF 0%, #FFFFFF 50%, #F5F9FF 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Elementos decorativos de fondo sutiles */
        .bg-decoration {
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }

        .bg-circle-1 {
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(11,132,245,0.06) 0%, transparent 70%);
            top: -150px;
            right: -100px;
        }

        .bg-circle-2 {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(11,132,245,0.04) 0%, transparent 70%);
            bottom: -120px;
            left: -80px;
        }

        .bg-dots {
            width: 200px;
            height: 200px;
            background-image: radial-gradient(rgba(11,132,245,0.1) 2px, transparent 2px);
            background-size: 30px 30px;
            top: 10%;
            left: 5%;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 3rem 2.5rem;
            background: var(--white);
            border-radius: 1.5rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            position: relative;
            z-index: 1;
            animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Línea decorativa superior */
        .login-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 2rem;
            right: 2rem;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), #60A5FA, var(--primary));
            border-radius: 0 0 4px 4px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cabecera premium */
        .brand {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-top: 0.8rem;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #0B84F5, #0652A3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            box-shadow: 0 8px 24px rgba(11,132,245,0.25);
        }

        .brand-logo svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        .brand h2 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            color: var(--text);
            margin-bottom: 0.2rem;
        }

        .brand span {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Mensaje de error */
        .error {
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 0.8rem;
            padding: 0.85rem 1.1rem;
            font-size: 0.85rem;
            color: #DC2626;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.8rem;
            font-weight: 500;
        }

        .error-icon {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            color: #DC2626;
        }

        /* Grupos de entrada */
        .input-group {
            position: relative;
            margin-bottom: 1.8rem;
        }

        .input-group input {
            width: 100%;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 0.9rem;
            color: var(--text);
            padding: 1rem 1rem 1rem 3rem;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            transition: all var(--transition);
            letter-spacing: 0.02em;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(11,132,245,0.08);
            background: var(--white);
        }

        .input-group input::placeholder {
            color: #94A3B8;
            font-weight: 400;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94A3B8;
            transition: color var(--transition);
            pointer-events: none;
            display: flex;
            align-items: center;
            z-index: 1;
        }

        .input-group:focus-within .input-icon {
            color: var(--primary);
        }

        /* Botón premium */
        button {
            width: 100%;
            background: linear-gradient(135deg, #0B84F5, #0652A3);
            color: white;
            border: none;
            padding: 1rem;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            border-radius: 0.9rem;
            transition: all var(--transition);
            margin-top: 0.5rem;
            box-shadow: 0 4px 16px rgba(11,132,245,0.3);
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(11,132,245,0.4);
            background: linear-gradient(135deg, #1E8AF5, #0A6AD4);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(11,132,245,0.3);
        }

        /* Efecto de brillo al hacer hover */
        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255,255,255,0.1),
                transparent
            );
            transform: rotate(45deg);
            transition: 0.5s;
            opacity: 0;
        }

        button:hover::after {
            opacity: 1;
            left: 100%;
        }

        /* Footer informativo */
        .login-footer {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.78rem;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
        }

        .login-footer span {
            color: var(--primary);
            font-weight: 600;
        }

        /* Ajustes responsivos */
        @media (max-width: 480px) {
            .login-wrapper {
                margin: 1rem;
                padding: 2.5rem 1.5rem;
                border-radius: 1.2rem;
            }
            .brand h2 {
                font-size: 1.8rem;
            }
            .login-wrapper::before {
                left: 1.5rem;
                right: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Elementos decorativos de fondo -->
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>
    <div class="bg-decoration bg-dots"></div>

    <div class="login-wrapper">
        
        <!-- Cabecera de marca -->
        <div class="brand">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h2>NUTRICAN</h2>
            <span>Portal de Administración</span>
        </div>

        <!-- Mensajes de error del sistema -->
        {% with messages = get_flashed_messages(category_filter=["error"]) %}
          {% if messages %}
            <div class="error">
                <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <!-- Formulario de acceso -->
        <form method="POST">
            <!-- Campo Usuario -->
            <div class="input-group">
                <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </span>
                <input type="text" name="username" placeholder="Nombre de usuario" required>
            </div>

            <!-- Campo Contraseña -->
            <div class="input-group">
                <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </span>
                <input type="password" name="password" placeholder="Contraseña segura" required>
            </div>

            <!-- Botón de envío -->
            <button type="submit">Ingresar al Sistema</button>
        </form>

        <!-- Pie informativo -->
        <div class="login-footer">
            ¿Problemas para acceder? Contacta a <span>soporte@nutrican.com</span>
        </div>
    </div>

</body>
</html>
